name: Deploy HeX-GiG Agent UI

on:
  # push:
  #   branches: [main]
  workflow_dispatch: # Manual trigger for on-demand builds

env:
  PROJECT_ID: hex-gig
  IMAGE_NAME: hex-gig-agent-ui
  RESOURCE_GROUP: healthsociety
  BICEP_PARAM_FILE: infrastructure/hex-gig-agent-ui.bicepparam

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Azure Container Registry
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HEX_GIG_ACR_LOGIN_SERVER }}
          username: ${{ secrets.HEX_GIG_ACR_USERNAME }}
          password: ${{ secrets.HEX_GIG_ACR_PASSWORD }}

      # Step 4: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_PROJECT_ID=${{ env.PROJECT_ID }}
            NEXT_PUBLIC_SIDEBAR_VIEW_ACCESS=false
          tags: |
            ${{ secrets.HEX_GIG_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.HEX_GIG_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

