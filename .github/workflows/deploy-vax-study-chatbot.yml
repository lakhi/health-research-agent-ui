name: Deploy VaxStudy Chatbot

on:
  workflow_dispatch: # Manual trigger only

env:
  PROJECT_ID: vax-study-chatbot
  IMAGE_NAME: vax-study-chatbot-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Azure Container Registry
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.VAX_ACR_LOGIN_SERVER }}
          username: ${{ secrets.VAX_ACR_USERNAME }}
          password: ${{ secrets.VAX_ACR_PASSWORD }}

      # Step 4: Build and push Docker image with project-specific configuration
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_PROJECT_ID=${{ env.PROJECT_ID }}
          tags: |
            ${{ secrets.VAX_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.VAX_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Image pushed successfully
        run: |
          echo "✅ Image pushed to: ${{ secrets.VAX_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
          echo "ℹ️  Run the following locally to deploy the container app:"
          echo "   az containerapp update --name marhinovirus-infobot --resource-group vax-study --image ${{ secrets.VAX_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
